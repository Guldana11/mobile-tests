device.name=iPhone 17
platform.version=26.5
bundle.id=ibn.bnk.kz
app.path=apps/ios/BNK.app
# State reset on iOS is done ourselves via `xcrun simctl uninstall booted` in BaseTest.
# We tell Appium to keep its hands off (noReset=true, fullReset=false) — its own fullReset on
# XCUITest does extra deep cleanup that doubles test runtime for no extra correctness.
# After our uninstall, Appium auto-installs the .app on session start from the `app` cap.
no.reset=true
full.reset=false
appium.server.url=http://127.0.0.1:4723
